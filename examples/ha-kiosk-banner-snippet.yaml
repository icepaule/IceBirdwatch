      # Vogelbad: neue Erkennung (blendet nach 90s automatisch aus)
      - type: conditional
        conditions:
          - condition: template
            value_template: >
              {% set s = states.sensor.vogelbad_letzte_erkennung %}
              {{ s is not none and s.state not in ['unknown','unavailable',''] and (as_timestamp(now()) - as_timestamp(s.last_changed)) < 90 }}
        card:
          type: custom:mushroom-template-card
          primary: "Neuer Vogel: {{ states('sensor.vogelbad_letzte_erkennung') }}"
          secondary: "{{ state_attr('sensor.vogelbad_letzte_erkennung', 'lateinisch') }}"
          icon: mdi:bird
          icon_color: green
          tap_action:
            action: navigate
            navigation_path: /lovelace-vogelbad/historie
          card_mod:
            style: |
              ha-card {
                background-color: rgba(76, 175, 80, 0.15) !important;
                border: 2px solid green !important;
              }
