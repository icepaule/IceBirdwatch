mqtt:
  host: "<mqtt-broker-ip>"
  port: 1883
  user: "CHANGE_ME"
  password: "CHANGE_ME"
  topic_prefix: frigate

detectors:
  cpu1:
    type: cpu
    num_threads: 2

# ---------------------------------------------------------------------------
# Diagnose-Vorgehen: siehe docs/hardware.md ("Diagnose-Vorgehen").
# Bei dieser Kamera: RTSP (554) zu, DVRIP/XM-Protokoll auf 34567 offen ->
# go2rtc (in Frigate eingebaut) spricht DVRIP nativ, kein RTSP-URL-Bau noetig.
#
# Falls die Kamera in einem isolierten IoT-VLAN haengt, auf das der
# Frigate-Host keinen Zugriff hat: TCP-Relay (z.B. socat) auf einem Host mit
# Zugriff aufsetzen, Frigate zeigt dann auf den Relay statt direkt auf die
# Kamera-IP. Details siehe docs/setup.md.
#
# Privacy-Crop (Nachbargrundstueck im Bild): siehe docs/setup.md Abschnitt
# "Privacy-Crop" - NICHT als Frigate output_args, sondern als eigener
# go2rtc-"exec"-Stream VOR Frigate, mit korrekt ermittelter realer
# Stream-Aufloesung (nicht aus Kamera-Config-Feldern raten!) und
# "format=yuv420p" im Filter gegen Farbfehler.
# ---------------------------------------------------------------------------
go2rtc:
  streams:
    vogelbad_dvrip:
      - dvrip://CHANGE_ME:CHANGE_ME@<kamera-ip-oder-relay>:34567
    # optional, nur falls Privacy-Crop gebraucht wird (siehe docs/setup.md):
    # vogelbad_cropped:
    #   - exec:/usr/lib/ffmpeg/7.0/bin/ffmpeg -i rtsp://127.0.0.1:8554/vogelbad_dvrip -vf "crop=W:H:X:Y,format=yuv420p" -c:v libx264 -preset ultrafast -an -f rtsp {{output}}

cameras:
  vogelbad:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/vogelbad_dvrip
          input_args: preset-rtsp-restream
          roles:
            - detect
            - record
    detect:
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - bird
      filters:
        bird:
          min_score: 0.6
          threshold: 0.7
    record:
      enabled: true
    snapshots:
      enabled: true
      bounding_box: false
      retain:
        default: 30

# Schema seit Frigate 0.15+ (alteres record.retain.days/mode direkt gibt es
# nicht mehr, "Extra inputs are not permitted"):
record:
  enabled: true
  motion:
    days: 3
  alerts:
    retain:
      days: 7
      mode: motion
  detections:
    retain:
      days: 7
      mode: motion

snapshots:
  enabled: true
