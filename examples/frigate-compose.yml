services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "128mb"
    devices: []
    environment:
      # noetig fuer den go2rtc-"exec"-Crop-Stream, siehe docs/setup.md
      # Abschnitt "Privacy-Crop" - exec:-Quellen sind sonst deaktiviert.
      - GO2RTC_ALLOW_ARBITRARY_EXEC=true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config.yml:/config/config.yml:ro
      - ./storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 268435456
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
